<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOBLIUM - 会員登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#f0faf7',100:'#d1f5ec',200:'#a3ead8',300:'#6ed9bf',400:'#3ec4a3',500:'#1eb38a',600:'#16A177',700:'#127e5e',800:'#0e5f47',900:'#094030' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-primary-50 font-sans">

  <!-- Header -->
  <header class="bg-primary-600 shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <a href="01_top.html" class="flex items-center gap-2">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-white">
          <span class="text-sm font-bold text-primary-600">J</span>
        </div>
        <span class="text-xl font-bold text-white">JOBLIUM</span>
      </a>
      <nav class="flex items-center gap-4">
        <a href="25_how-to-use.html" class="text-sm font-medium text-white/80 hover:text-white">使い方</a>
        <a href="26_faq.html" class="text-sm font-medium text-white/80 hover:text-white">よくある質問</a>
      </nav>
    </div>
  </header>

  <div class="flex min-h-[calc(100vh-64px)] items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="rounded-3xl bg-white p-8 shadow-lg">
        <div class="text-center mb-8">
          <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-primary-600 mb-4">
            <span class="text-2xl font-bold text-white">J</span>
          </div>
          <h1 class="text-2xl font-bold text-gray-900">新規会員登録</h1>
          <p class="mt-1 text-sm text-gray-500">無料で始めましょう</p>
        </div>

        <!-- Role Select -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">登録区分</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="relative flex cursor-pointer items-center gap-3 rounded-xl border-2 border-primary-500 bg-primary-50 p-4">
              <input type="radio" name="role" checked class="sr-only" />
              <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary-600 text-white">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              </div>
              <div>
                <div class="text-sm font-semibold text-gray-900">求職者</div>
                <div class="text-xs text-gray-500">事業所を探す</div>
              </div>
              <div class="absolute top-2 right-2 flex h-4 w-4 items-center justify-center rounded-full bg-primary-600">
                <svg class="h-2.5 w-2.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
              </div>
            </label>
            <label class="relative flex cursor-pointer items-center gap-3 rounded-xl border-2 border-gray-200 bg-white p-4 hover:border-primary-300">
              <input type="radio" name="role" class="sr-only" />
              <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gray-100 text-gray-600">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
              </div>
              <div>
                <div class="text-sm font-semibold text-gray-900">事業者</div>
                <div class="text-xs text-gray-500">事業所を掲載</div>
              </div>
            </label>
          </div>
        </div>

        <form class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">お名前 <span class="text-red-500">*</span></label>
            <input type="text" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100" placeholder="山田 太郎" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">メールアドレス <span class="text-red-500">*</span></label>
            <input type="email" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100" placeholder="example@email.com" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">パスワード <span class="text-red-500">*</span></label>
            <input type="password" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100" placeholder="8文字以上" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">パスワード（確認） <span class="text-red-500">*</span></label>
            <input type="password" class="w-full rounded-xl border border-gray-300 px-4 py-3 text-sm outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100" placeholder="もう一度入力してください" />
          </div>

          <div class="flex items-start gap-2 pt-1">
            <input type="checkbox" id="agree" class="mt-0.5 h-4 w-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500" />
            <label for="agree" class="text-xs text-gray-600">
              <a href="#" class="text-primary-600 hover:underline">利用規約</a>および<a href="#" class="text-primary-600 hover:underline">プライバシーポリシー</a>に同意します
            </label>
          </div>

          <a href="08_mypage.html" class="block w-full rounded-xl bg-primary-600 py-3 text-center text-sm font-semibold text-white hover:bg-primary-700 transition-colors mt-2">
            無料で登録する
          </a>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
          すでにアカウントをお持ちの方は
          <a href="02_login.html" class="font-semibold text-primary-600 hover:underline">ログイン</a>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-12 mt-12">
    <div class="mx-auto max-w-6xl px-4">
      <div class="grid gap-8 sm:grid-cols-2 md:grid-cols-4">
        <div>
          <div class="flex items-center gap-2 mb-3">
            <div class="flex h-7 w-7 items-center justify-center rounded-md bg-primary-600">
              <span class="text-xs font-bold text-white">J</span>
            </div>
            <span class="font-bold text-white">JOBLIUM</span>
          </div>
          <p class="text-xs leading-relaxed">障害者就労支援事業所検索サービス。あなたに合った働き方をサポートします。</p>
        </div>
        <div>
          <h4 class="font-semibold text-white mb-3">サービス</h4>
          <ul class="space-y-2 text-sm">
            <li><a href="04_facilities.html" class="hover:text-white">事業所を探す</a></li>
            <li><a href="03_register.html" class="hover:text-white">会員登録（求職者）</a></li>
            <li><a href="03_register.html" class="hover:text-white">事業所掲載（事業者）</a></li>
          </ul>
        </div>
        <div>
          <h4 class="font-semibold text-white mb-3">サポート</h4>
          <ul class="space-y-2 text-sm">
            <li><a href="25_how-to-use.html" class="hover:text-white">使い方ガイド</a></li>
            <li><a href="26_faq.html" class="hover:text-white">よくある質問</a></li>
            <li><a href="27_contact.html" class="hover:text-white">お問い合わせ</a></li>
          </ul>
        </div>
        <div>
          <h4 class="font-semibold text-white mb-3">会社情報</h4>
          <ul class="space-y-2 text-sm">
            <li><a href="32_company.html" class="hover:text-white">運営会社</a></li>
            <li><a href="30_privacy-policy.html" class="hover:text-white">プライバシーポリシー</a></li>
            <li><a href="31_terms-of-service.html" class="hover:text-white">利用規約</a></li>
          </ul>
        </div>
      </div>
      <div class="mt-10 border-t border-gray-800 pt-6 text-center text-xs">
        &copy; 2026 JOBLIUM All rights reserved.
      </div>
    </div>
  </footer>
</body>
</html>
