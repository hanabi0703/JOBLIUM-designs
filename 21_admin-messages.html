<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOBLIUM - メッセージ管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50:'#f0faf7',100:'#d1f5ec',200:'#a3ead8',300:'#6ed9bf',400:'#3ec4a3',500:'#1eb38a',600:'#16A177',700:'#127e5e',800:'#0e5f47',900:'#094030' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-gray-900 shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
      <div class="flex items-center gap-3">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary-600">
          <span class="text-sm font-bold text-white">J</span>
        </div>
        <span class="text-xl font-bold text-white">JOBLIUM</span>
        <span class="rounded-md bg-red-600 px-2 py-0.5 text-xs font-bold text-white">ADMIN</span>
      </div>
      <nav class="hidden items-center gap-1 md:flex">
        <a href="17_admin-dashboard.html" class="rounded-lg px-4 py-2 text-sm font-medium text-white/70 hover:bg-white/10">ダッシュボード</a>
        <a href="18_admin-users.html"     class="rounded-lg px-4 py-2 text-sm font-medium text-white/70 hover:bg-white/10">ユーザー管理</a>
        <a href="19_admin-offices.html"   class="rounded-lg px-4 py-2 text-sm font-medium text-white/70 hover:bg-white/10">事業所管理</a>
        <a href="21_admin-messages.html"  class="rounded-lg bg-white/10 px-4 py-2 text-sm font-semibold text-white">メッセージ管理</a>
        <a href="20_admin-master.html"    class="rounded-lg px-4 py-2 text-sm font-medium text-white/70 hover:bg-white/10">マスタ管理</a>
      </nav>
      <div class="flex items-center gap-3">
        <span class="text-sm text-white/70">admin@joblium.com</span>
        <span class="rounded-full bg-red-600 px-2.5 py-0.5 text-xs font-bold text-white">管理者</span>
      </div>
    </div>
  </header>

  <div class="mx-auto max-w-7xl px-4 py-8">

    <!-- タイトル＋サマリ -->
    <div class="mb-6 flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">メッセージ管理</h1>
        <p class="text-sm text-gray-500 mt-0.5">利用者・事業者間のメッセージを検索し、違反が確認された場合に警告を送信します</p>
      </div>
    </div>

    <!-- サマリカード -->
    <div class="grid grid-cols-4 gap-4 mb-7">
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-gray-200 text-center">
        <div class="text-2xl font-extrabold text-gray-900">12,480</div>
        <div class="text-xs text-gray-500 mt-1">総メッセージ数</div>
        <div class="text-xs text-primary-600 mt-1 font-medium">+148 今月</div>
      </div>
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-gray-200 text-center">
        <div class="text-2xl font-extrabold text-red-600">7</div>
        <div class="text-xs text-gray-500 mt-1">報告済みメッセージ</div>
        <div class="text-xs text-red-500 mt-1 font-medium">要対応</div>
      </div>
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-gray-200 text-center">
        <div class="text-2xl font-extrabold text-yellow-600">23</div>
        <div class="text-xs text-gray-500 mt-1">警告送信済み</div>
        <div class="text-xs text-yellow-600 mt-1 font-medium">累計</div>
      </div>
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-gray-200 text-center">
        <div class="text-2xl font-extrabold text-gray-900">3</div>
        <div class="text-xs text-gray-500 mt-1">アカウント停止中</div>
        <div class="text-xs text-gray-400 mt-1 font-medium">対応済み</div>
      </div>
    </div>

    <!-- 検索フォーム -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-sm p-5 mb-6">
      <h2 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
        <svg class="h-4 w-4 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        メッセージ検索
      </h2>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">利用者名</label>
          <input id="q-user" type="text" placeholder="例：山田 太郎"
            class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400 focus:ring-1 focus:ring-primary-100"
            onkeydown="if(event.key==='Enter') runSearch()">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">事業者名</label>
          <input id="q-office" type="text" placeholder="例：サンシャイン"
            class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400 focus:ring-1 focus:ring-primary-100"
            onkeydown="if(event.key==='Enter') runSearch()">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">ステータス</label>
          <select id="q-status" class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-primary-400">
            <option value="all">すべて</option>
            <option value="normal">正常</option>
            <option value="reported">報告済み</option>
            <option value="warned">警告送信済み</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">期間</label>
          <div class="flex items-center gap-2">
            <input id="q-from" type="date" value="2026-04-01"
              class="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400">
            <span class="text-gray-400 text-sm">〜</span>
            <input id="q-to" type="date" value="2026-04-09"
              class="flex-1 rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400">
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="runSearch()"
          class="flex items-center gap-2 rounded-xl bg-primary-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-primary-700 transition-colors shadow-sm">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          検索する
        </button>
        <button onclick="resetSearch()"
          class="rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
          リセット
        </button>
        <span id="result-count" class="text-xs text-gray-400 ml-2"></span>
      </div>
    </div>

    <!-- 検索結果テーブル -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-sm overflow-hidden">
      <div class="px-5 py-3.5 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
        <h2 class="text-sm font-bold text-gray-700">検索結果</h2>
        <div class="flex items-center gap-2">
          <span class="text-xs text-gray-400">報告済みを優先表示</span>
          <div class="relative inline-block">
            <input type="checkbox" checked id="sort-reported" class="sr-only peer" onchange="renderResults()">
            <label for="sort-reported" class="flex h-5 w-9 cursor-pointer items-center rounded-full bg-gray-200 peer-checked:bg-primary-500 transition-colors">
              <span class="ml-0.5 h-4 w-4 rounded-full bg-white shadow transition-transform peer-checked:translate-x-4 block"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- テーブルヘッダ -->
      <table class="w-full text-sm" id="result-table">
        <thead>
          <tr class="border-b border-gray-100 bg-gray-50/50">
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 w-32">日時</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 w-28">利用者</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400 w-44">事業者</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-400">メッセージ内容</th>
            <th class="text-center px-5 py-3 text-xs font-semibold text-gray-400 w-24">ステータス</th>
            <th class="text-center px-5 py-3 text-xs font-semibold text-gray-400 w-44">操作</th>
          </tr>
        </thead>
        <tbody id="result-tbody" class="divide-y divide-gray-50">
          <!-- JSで挿入 -->
        </tbody>
      </table>

      <!-- 空状態 -->
      <div id="result-empty" style="display:none" class="py-16 text-center">
        <div class="text-4xl mb-3">🔍</div>
        <p class="text-sm text-gray-400">条件に一致するメッセージが見つかりませんでした</p>
      </div>
    </div>

  </div><!-- /max-w-7xl -->


  <!-- 会話スレッドモーダル -->
  <div id="thread-modal" style="display:none" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/50" onclick="closeThreadModal()"></div>
    <div class="relative w-full max-w-2xl rounded-2xl bg-white shadow-2xl flex flex-col overflow-hidden" style="max-height:90vh">

      <!-- スレッドヘッダ -->
      <div class="flex items-center justify-between px-5 py-4 bg-gray-900 flex-shrink-0">
        <div class="flex items-center gap-3">
          <div id="th-avatar" class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-gray-400 to-gray-600 text-sm font-bold text-white flex-shrink-0"></div>
          <div>
            <div class="flex items-center gap-2">
              <span id="th-user" class="text-sm font-bold text-white"></span>
              <svg class="h-3.5 w-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
              <span id="th-office" class="text-sm text-gray-300"></span>
            </div>
            <div class="flex items-center gap-2 mt-0.5">
              <span id="th-status-badge"></span>
              <span id="th-date" class="text-xs text-gray-400"></span>
            </div>
          </div>
        </div>
        <button onclick="closeThreadModal()" class="text-gray-400 hover:text-white transition-colors">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- メッセージバブルエリア -->
      <div id="th-bubbles" class="flex-1 overflow-y-auto px-5 py-5 space-y-4 bg-gray-50" style="min-height:280px">
        <!-- JSで挿入 -->
      </div>

      <!-- 警告送信パネル -->
      <div class="flex-shrink-0 border-t-2 border-red-100 bg-white">
        <!-- 警告パネルトグルヘッダ -->
        <button onclick="toggleWarnPanel()" id="warn-panel-toggle"
          class="w-full flex items-center justify-between px-5 py-3 hover:bg-red-50 transition-colors">
          <span class="flex items-center gap-2 text-xs font-bold text-red-600">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            警告文を送信する
          </span>
          <svg id="warn-panel-chevron" class="h-4 w-4 text-red-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>

        <!-- 警告フォーム（折りたたみ） -->
        <div id="warn-panel-form" style="display:none" class="px-5 pb-4 space-y-3 border-t border-red-50">
          <div class="grid grid-cols-2 gap-3 pt-3">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1.5">違反種別</label>
              <select id="th-warn-type" onchange="applyThreadWarnTemplate()"
                class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm bg-white focus:outline-none focus:border-red-300">
                <option value="">選択してください</option>
                <option value="inappropriate">不適切な内容・誹謗中傷</option>
                <option value="spam">スパム・広告行為</option>
                <option value="harassment">ハラスメント・脅迫</option>
                <option value="privacy">個人情報の漏洩・要求</option>
                <option value="fraud">詐欺・虚偽情報</option>
                <option value="other">その他</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1.5">送信先</label>
              <select id="th-warn-target" class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm bg-white focus:outline-none focus:border-red-300">
                <option value="user">利用者のみ</option>
                <option value="office">事業者のみ</option>
                <option value="both">両方</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1.5">警告文</label>
            <textarea id="th-warn-text" rows="3"
              class="w-full rounded-xl border border-gray-200 px-3 py-2 text-sm resize-none focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-100"
              placeholder="違反種別を選択するとテンプレートが挿入されます"></textarea>
          </div>
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1.5 cursor-pointer text-xs text-gray-600">
              <input type="checkbox" id="th-action-restrict" class="accent-red-500 rounded">
              メッセージ機能を一時制限（7日間）
            </label>
            <label class="flex items-center gap-1.5 cursor-pointer text-xs text-gray-600 ml-3">
              <input type="checkbox" id="th-action-suspend" class="accent-red-500 rounded">
              アカウントを停止
            </label>
          </div>
          <div class="flex gap-2 pt-1">
            <button onclick="toggleWarnPanel()" class="flex-shrink-0 rounded-xl border border-gray-200 px-4 py-2 text-xs font-medium text-gray-600 hover:bg-gray-50">キャンセル</button>
            <button onclick="sendThreadWarning()"
              class="flex-1 rounded-xl bg-red-500 py-2 text-xs font-bold text-white hover:bg-red-600 transition-colors flex items-center justify-center gap-1.5">
              <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
              この会話に警告文を送信する
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 警告送信モーダル -->
  <div id="warn-modal" style="display:none" class="fixed inset-0 z-50 flex items-center justify-center">
    <div class="absolute inset-0 bg-black/40" onclick="closeWarnModal()"></div>
    <div class="relative w-full max-w-lg mx-4 rounded-2xl bg-white shadow-2xl overflow-hidden">

      <!-- モーダルヘッダ -->
      <div class="flex items-center justify-between px-6 py-4 bg-red-50 border-b border-red-100">
        <div class="flex items-center gap-2">
          <svg class="h-5 w-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          <h2 class="text-sm font-bold text-red-700">警告メッセージを送信</h2>
        </div>
        <button onclick="closeWarnModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="px-6 py-5 space-y-4">

        <!-- 対象メッセージのプレビュー -->
        <div class="rounded-xl bg-gray-50 border border-gray-200 p-3">
          <p class="text-xs font-semibold text-gray-500 mb-1">対象メッセージ</p>
          <p id="modal-msg-preview" class="text-sm text-gray-700 leading-relaxed"></p>
          <div class="flex gap-3 mt-2 text-xs text-gray-400">
            <span id="modal-msg-user"></span>
            <span>→</span>
            <span id="modal-msg-office"></span>
            <span id="modal-msg-date"></span>
          </div>
        </div>

        <!-- 警告送信先 -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">警告の送信先</label>
          <div class="flex gap-3">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="warn-target" value="user" checked class="accent-red-500">
              <span class="text-sm text-gray-700">利用者のみ</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="warn-target" value="office" class="accent-red-500">
              <span class="text-sm text-gray-700">事業者のみ</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="radio" name="warn-target" value="both" class="accent-red-500">
              <span class="text-sm text-gray-700">両方</span>
            </label>
          </div>
        </div>

        <!-- 違反種別 -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">違反種別</label>
          <select id="warn-type" onchange="applyWarnTemplate()"
            class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm bg-white focus:outline-none focus:border-red-300">
            <option value="">選択してください</option>
            <option value="inappropriate">不適切な内容・誹謗中傷</option>
            <option value="spam">スパム・広告行為</option>
            <option value="harassment">ハラスメント・脅迫</option>
            <option value="privacy">個人情報の漏洩・要求</option>
            <option value="fraud">詐欺・虚偽情報</option>
            <option value="other">その他</option>
          </select>
        </div>

        <!-- 警告文 -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">警告文</label>
          <textarea id="warn-text" rows="5"
            class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm resize-none focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-100"
            placeholder="違反種別を選択するとテンプレートが挿入されます"></textarea>
        </div>

        <!-- 追加措置 -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">追加措置</label>
          <div class="space-y-2">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="action-restrict" class="accent-red-500 rounded">
              <span class="text-sm text-gray-700">メッセージ機能を一時制限する（7日間）</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="action-suspend" class="accent-red-500 rounded">
              <span class="text-sm text-gray-700">アカウントを停止する</span>
            </label>
          </div>
        </div>

      </div>

      <!-- モーダルフッタ -->
      <div class="flex gap-3 px-6 py-4 bg-gray-50 border-t border-gray-100">
        <button onclick="closeWarnModal()" class="flex-1 rounded-xl border-2 border-gray-200 py-2.5 text-sm font-semibold text-gray-600 hover:bg-white transition-colors">キャンセル</button>
        <button onclick="sendWarning()" class="flex-1 rounded-xl bg-red-500 py-2.5 text-sm font-bold text-white hover:bg-red-600 transition-colors flex items-center justify-center gap-2">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          警告を送信する
        </button>
      </div>
    </div>
  </div>


  <script>
    /* ─── サンプルデータ ─── */
    const MSG_DATA = [

      { id:'m02', date:'2026-04-09 09:48', user:'鈴木 花子',   office:'サンシャイン就労A型センター', text:'就労継続支援A型の工賃について詳しく教えていただけますか？月額の平均を知りたいです。', status:'normal' },

    let filteredData = [...MSG_DATA]

    /* ─── ステータスラベル ─── */
    function statusBadge(status) {
      const map = {
        normal:   '<span class="rounded-full bg-gray-100 px-2.5 py-0.5 text-xs font-semibold text-gray-500">正常</span>',
        reported: '<span class="rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-semibold text-red-600">報告済み</span>',
        warned:   '<span class="rounded-full bg-yellow-100 px-2.5 py-0.5 text-xs font-semibold text-yellow-700">警告済み</span>',
      }
      return map[status] || ''
    }

    /* ─── 検索実行 ─── */
    function runSearch() {
      const qUser   = document.getElementById('q-user').value.trim().toLowerCase()
      const qOffice = document.getElementById('q-office').value.trim().toLowerCase()
      const qStatus = document.getElementById('q-status').value

      filteredData = MSG_DATA.filter(m => {
        if (qUser   && !m.user.toLowerCase().includes(qUser))     return false
        if (qOffice && !m.office.toLowerCase().includes(qOffice)) return false
        if (qStatus !== 'all' && m.status !== qStatus)            return false
        return true
      })

      renderResults()
      document.getElementById('result-count').textContent =
        `${filteredData.length} 件見つかりました`
    }

    /* ─── 結果を描画 ─── */
    function renderResults() {
      const prioritize = document.getElementById('sort-reported')?.checked
      let data = [...filteredData]
      if (prioritize) {
        const order = { reported:0, warned:1, normal:2 }
        data.sort((a,b) => (order[a.status] ?? 9) - (order[b.status] ?? 9))
      }

      const tbody = document.getElementById('result-tbody')
      const empty = document.getElementById('result-empty')

      if (data.length === 0) {
        tbody.innerHTML = ''
        empty.style.display = ''
        return
      }
      empty.style.display = 'none'

      tbody.innerHTML = data.map(m => `
        <tr class="hover:bg-gray-50 transition-colors ${m.status === 'reported' ? 'bg-red-50/40' : ''}">
          <td class="px-5 py-3.5 text-xs text-gray-400 whitespace-nowrap">${m.date}</td>
          <td class="px-5 py-3.5">
            <div class="flex items-center gap-2">
              <div class="flex h-7 w-7 flex-shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-gray-400 to-gray-600 text-xs font-bold text-white">${m.user.charAt(0)}</div>

          <td class="px-5 py-3.5">

                class="inline-flex items-center gap-1.5 rounded-xl border border-gray-200 bg-white px-3 py-1.5 text-xs font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>

                <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>

      document.getElementById('warn-panel-chevron').style.transform = ''
      document.getElementById('th-warn-type').value = ''
      document.getElementById('th-warn-text').value = ''

      document.getElementById('thread-modal').style.display = 'none'

    function toggleWarnPanel() {
      const form    = document.getElementById('warn-panel-form')
      const chevron = document.getElementById('warn-panel-chevron')
      const isOpen  = form.style.display !== 'none'
      form.style.display    = isOpen ? 'none' : ''
      chevron.style.transform = isOpen ? '' : 'rotate(180deg)'
    }

    function applyThreadWarnTemplate() {
      const type = document.getElementById('th-warn-type').value
      if (type && WARN_TEMPLATES[type]) {
        document.getElementById('th-warn-text').value = WARN_TEMPLATES[type]
      }
    }

    function sendThreadWarning() {
      const warnText = document.getElementById('th-warn-text').value.trim()
      if (!warnText) { alert('警告文を入力してください'); return }
      if (!currentThreadMsgId) return

      // スレッドに警告バブルを追加
      const now = new Date()
      const timeStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
      const bubblesEl = document.getElementById('th-bubbles')
      const adminBubble = document.createElement('div')
      adminBubble.className = 'flex justify-center'
      adminBubble.innerHTML = `<div class="max-w-md rounded-2xl bg-red-500 px-4 py-3 text-xs text-white leading-relaxed shadow-sm">
        <div class="flex items-center gap-1.5 mb-1.5 font-bold">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          運営からの警告
        </div>
        ${warnText.replace(/\n/g, '<br>')}
        <p class="text-red-200 text-right mt-1" style="font-size:10px">${timeStr}</p>
      </div>`
      bubblesEl.appendChild(adminBubble)
      bubblesEl.scrollTop = bubblesEl.scrollHeight

      // ステータス更新
      const m = MSG_DATA.find(x => x.id === currentThreadMsgId)
      if (m) m.status = 'warned'
      renderResults()

      // パネルを閉じる
      toggleWarnPanel()
      document.getElementById('th-warn-type').value = ''
      document.getElementById('th-warn-text').value = ''

      showToast('警告メッセージを送信しました')
    }

      if (!m || m.status === 'warned') return
      currentMsgId = msgId

      document.getElementById('modal-msg-preview').textContent = m.text
      document.getElementById('modal-msg-user').textContent    = m.user
      document.getElementById('modal-msg-office').textContent  = m.office
      document.getElementById('modal-msg-date').textContent    = m.date
      document.getElementById('warn-type').value  = ''
      document.getElementById('warn-text').value  = ''
      document.getElementById('action-restrict').checked = false
      document.getElementById('action-suspend').checked  = false
      document.querySelectorAll('input[name="warn-target"]')[0].checked = true

      document.getElementById('warn-modal').style.display = 'flex'
    }

    function closeWarnModal() {
      document.getElementById('warn-modal').style.display = 'none'
      currentMsgId = null
    }

    /* ─── 違反種別テンプレート挿入 ─── */
    function applyWarnTemplate() {
      const type = document.getElementById('warn-type').value
      if (type && WARN_TEMPLATES[type]) {
        document.getElementById('warn-text').value = WARN_TEMPLATES[type]
      }
    }

    /* ─── 警告送信 ─── */
    function sendWarning() {
      if (!currentMsgId) return
      const warnText = document.getElementById('warn-text').value.trim()
      if (!warnText) {
        alert('警告文を入力してください')
        return
      }

      // ステータス更新
      const m = MSG_DATA.find(x => x.id === currentMsgId)
      if (m) m.status = 'warned'

      closeWarnModal()
      renderResults()

      // 完了トースト
      showToast('警告メッセージを送信しました')
    }

    /* ─── トースト通知 ─── */
    function showToast(msg) {
      const toast = document.createElement('div')
      toast.className = 'fixed bottom-6 right-6 z-50 flex items-center gap-3 rounded-2xl bg-gray-900 px-5 py-3.5 text-sm font-semibold text-white shadow-xl'
      toast.innerHTML = `<svg class="h-4 w-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>${msg}`
      document.body.appendChild(toast)
      setTimeout(() => toast.remove(), 3000)
    }

    /* ─── 初期表示 ─── */
    renderResults()
  </script>

</body>
</html>
